services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mywebapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck: # Додаємо перевірку готовності БД
      test: ["CMD-SHELL", "pg_isready -U app -d mywebapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lab2-net

  app:
    build: ./src
    restart: always
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: password123
      DB_NAME: mywebapp
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy # Тепер чекаємо саме на здоров'я бази
    networks:
      - lab2-net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_started
    networks:
      - lab2-net

networks:
  lab2-net:
    driver: bridge

volumes:
  pgdata:
